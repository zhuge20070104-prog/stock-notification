# 监控列表：threshold + direction(below/above) 触发告警；省略 threshold 则只展示价格
watchlist:
  - symbol: ORCL
    threshold: 165
    direction: below
  - symbol: AMZN
    threshold: 260
    direction: below
  - symbol: XLK
    threshold: 159
    direction: below
  - symbol: GOOG
    # 仅追踪价格，不告警

# 本地常驻 monitor 模式的轮询间隔（秒）。Lambda 模式忽略此项。
poll_interval_seconds: 600

# 命中阈值后，每隔这么多小时重发一次（即使之前已经通知过）。
# 取代旧的 dedupe_per_day。1.5h ≈ 90min，盘中 9h 大约 6 次/股票封顶。
min_alert_interval_hours: 1.5

# Top20 大盘科技股里涨幅 >= 阈值的也通知。同样按 min_alert_interval_hours 节流。
enable_gainer_alerts: true
gainer_pct_threshold: 5.0
gainer_pool_size: 20

notifiers:
  console:
    enabled: true
  # 飞书自定义群机器人：群设置 -> 群机器人 -> 添加机器人 -> 自定义机器人 -> 复制 Webhook
  feishu:
    enabled: false
    webhook_url: ""
  # Server酱（个人微信推送，sct.ftqq.com 注册后拿 SendKey）
  serverchan:
    enabled: false
    sendkey: ""
